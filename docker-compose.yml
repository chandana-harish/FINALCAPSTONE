version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: failure-analyzer-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: failure-analyzer-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - backend
    restart: always
